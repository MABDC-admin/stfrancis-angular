<section class="panel-card p-5">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h3 class="text-lg font-extrabold tracking-tight text-slate-950">{{ title }}</h3>
      <p class="mt-1 text-xs font-medium text-slate-500">{{ subtitle }}</p>
    </div>

    <button class="rounded-md border border-slate-200 px-3 py-2 text-xs font-extrabold text-blue-600 transition hover:bg-blue-50">
      View all
    </button>
  </div>

  <div class="mt-4 overflow-hidden rounded-lg border border-slate-200/80">
    <div *ngFor="let item of items" class="grid grid-cols-[auto_minmax(10rem,1fr)_minmax(12rem,1fr)_auto] items-center gap-3 border-b border-slate-200/70 bg-white px-3 py-3 last:border-b-0 hover:bg-slate-50">
      <div class="grid h-9 w-9 place-items-center rounded-full" [ngClass]="item.avatarClass">
        <span class="material-icons !text-[1.2rem]">{{ item.avatarIcon }}</span>
      </div>

      <p class="truncate text-sm font-extrabold text-slate-900">{{ item.student }}</p>
      <p class="truncate text-sm font-medium text-slate-500">{{ item.task }}</p>

      <span class="rounded-md px-3 py-1 text-xs font-extrabold" [ngClass]="item.statusClass">
        {{ item.status }}
      </span>
    </div>
  </div>
</section>
