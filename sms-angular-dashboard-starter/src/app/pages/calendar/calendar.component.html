<div class="p-6 h-full flex flex-col bg-slate-50/50">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">School Calendar</h1>
      <p class="text-sm text-slate-500">Manage holidays, exams, and other school events.</p>
    </div>
    <button (click)="openModal()" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition">
      <span class="material-icons text-[18px]">add</span>
      Add Event
    </button>
  </div>

  <div class="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
    <!-- Header Controls -->
    <div class="flex items-center justify-between p-4 border-b border-slate-100">
      <div class="flex items-center gap-4">
        <button (click)="previousMonth()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition">
          <span class="material-icons">chevron_left</span>
        </button>
        <h2 class="text-lg font-bold text-slate-700 min-w-[150px] text-center">
          {{ currentDate | date:'MMMM yyyy' }}
        </h2>
        <button (click)="nextMonth()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition">
          <span class="material-icons">chevron_right</span>
        </button>
      </div>
      <div class="flex gap-4 items-center">
        <div *ngFor="let type of eventTypes" class="flex items-center gap-1.5">
          <div class="w-3 h-3 rounded-full" [style.background]="type.color"></div>
          <span class="text-xs font-medium text-slate-600">{{ type.type }}</span>
        </div>
      </div>
    </div>

    <!-- Calendar Grid -->
    <div class="grid grid-cols-7 border-b border-slate-100 bg-slate-50">
      <div class="py-2 text-center text-xs font-bold text-slate-500 uppercase tracking-wider" *ngFor="let day of ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']">{{ day }}</div>
    </div>
    
    <div class="flex-1 grid grid-cols-7 grid-rows-5 bg-slate-200 gap-px">
      <div *ngFor="let day of daysInMonth" 
           class="bg-white min-h-[100px] p-2 transition hover:bg-slate-50 cursor-pointer flex flex-col group relative"
           [ngClass]="{'opacity-50': !isCurrentMonth(day), 'bg-indigo-50/30': isToday(day)}"
           (click)="openModal(day)">
        
        <div class="flex justify-between items-start">
          <span class="text-sm font-semibold w-7 h-7 flex items-center justify-center rounded-full"
                [ngClass]="{'bg-indigo-600 text-white': isToday(day), 'text-slate-700': !isToday(day)}">
            {{ day.getDate() }}
          </span>
          <button class="material-icons text-[16px] text-slate-300 opacity-0 group-hover:opacity-100 hover:text-indigo-600 transition">add</button>
        </div>

        <div class="mt-2 flex flex-col gap-1 overflow-y-auto flex-1 custom-scrollbar">
          <div *ngFor="let event of getEventsForDate(day)"
               (click)="$event.stopPropagation(); openModal(day, event)"
               class="px-2 py-1 rounded text-[10px] font-bold text-white truncate shadow-sm transition hover:brightness-110"
               [style.background]="event.color"
               [title]="event.title">
            {{ event.title }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in-95 duration-200">
    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
      <h3 class="text-lg font-bold text-slate-800">{{ editingEventId ? 'Edit Event' : 'Add New Event' }}</h3>
      <button (click)="closeModal()" class="text-slate-400 hover:text-slate-600 transition p-1"><span class="material-icons">close</span></button>
    </div>
    <form [formGroup]="eventForm" (ngSubmit)="saveEvent()" class="p-6 flex flex-col gap-4">
      <div>
        <label class="block text-xs font-semibold text-slate-700 mb-1">Event Title <span class="text-red-500">*</span></label>
        <input type="text" formControlName="title" class="w-full text-sm border-slate-200 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 placeholder-slate-400" placeholder="E.g., Midterm Exams">
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1">Start Date <span class="text-red-500">*</span></label>
          <input type="date" formControlName="eventDate" class="w-full text-sm border-slate-200 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1">End Date <span class="text-slate-400 font-normal">(Optional)</span></label>
          <input type="date" formControlName="endDate" class="w-full text-sm border-slate-200 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-700 mb-1">Event Type <span class="text-red-500">*</span></label>
        <select formControlName="eventType" class="w-full text-sm border-slate-200 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
          <option *ngFor="let type of eventTypes" [value]="type.type">{{ type.type }}</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-700 mb-1">Description</label>
        <textarea formControlName="description" rows="3" class="w-full text-sm border-slate-200 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 placeholder-slate-400" placeholder="Any additional details..."></textarea>
      </div>

      <div class="mt-4 flex justify-end gap-3 pt-4 border-t border-slate-100">
        <button *ngIf="editingEventId" type="button" (click)="deleteEvent()" class="mr-auto text-sm font-semibold text-red-600 hover:text-red-700 px-3 py-2 rounded-lg hover:bg-red-50 transition">
          Delete
        </button>
        <button type="button" (click)="closeModal()" class="px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-100 rounded-lg transition">Cancel</button>
        <button type="submit" [disabled]="eventForm.invalid" class="px-4 py-2 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
          {{ editingEventId ? 'Update Event' : 'Save Event' }}
        </button>
      </div>
    </form>
  </div>
</div>
